<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>User Registration</title>
<link rel="stylesheet" href="task5.css">
</head>
<body>

<div class="form-wrapper register-container">
<h2>Create Account</h2>

<form method="POST">

<div class="form-group">
<label for="fullname">Full Name</label>
<input type="text" id="fullname" name="fullname" placeholder="John Doe" required>
</div>

<div class="form-group">
<label for="email">Email Address</label>
<input type="email" id="email" name="email" placeholder="john@example.com" required>
</div>

<div class="form-group">
<label for="phone">Phone (10 Digits)</label>
<input type="tel" id="phone" name="phone" pattern="[0-9]{10}" placeholder="1234567890" required>
</div>

<div class="form-group">
<label for="dob">Date of Birth</label>
<input type="date" id="dob" name="dob" max="2010-01-01" required>
</div>

<div class="form-group">
<label>Gender</label>
<div class="radio-group">
<label><input type="radio" name="gender" required> Male</label>
<label><input type="radio" name="gender"> Female</label>
</div>
</div>

<div class="form-group">
<label for="country">Country</label>
<select id="country" name="country" required>
<option value="">Select Country</option>
<option>India</option>
<option>USA</option>
<option>UK</option>
</select>
</div>

<div class="form-group">
<label for="website">Website</label>
<input type="url" id="website" name="website" placeholder="https://">
</div>

<div class="form-group">
<label for="password">Password</label>
<input type="password" id="password" name="password" minlength="8" required>
</div>

<div class="form-group">
<label for="age">Age</label>
<input type="number" id="age" name="age" min="18" max="99" required>
</div>

<div class="checkbox-group">
<input type="checkbox" id="terms" required>
<label for="terms">I agree to Terms</label>
</div>

<button type="submit" class="btn-submit">Register Now</button>

<a href="task5.html" class="back-link">Back to Home</a>

</form>
</div>

</body>
</html>
