<!DOCTYPE html>
<html>
<head>
    <title>Task 4 - All Subjects</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            margin: 0;
            text-align: center;
        }

        h1 {
            background: linear-gradient(135deg, #5f0a87, #a4508b);
            color: white;
            padding: 20px;
            margin: 0;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .card:hover {
            transform: scale(1.05);
        }

        iframe {
            width: 90%;
            height: 500px;
            border: none;
            margin: 20px auto;
            display: block;
            background: white;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<h1>Task 4 - All Subjects</h1>

<div class="container">

    <div class="card" onclick="loadPage('../cao.html')">CAO</div>
    <div class="card" onclick="loadPage('../daa.html')">DAA</div>
    <div class="card" onclick="loadPage('../daalab.html')">DAA Lab</div>
    <div class="card" onclick="loadPage('../links.html')">Links</div>

    <div class="card" onclick="loadPage('../mpmc.html')">MPMC</div>
    <div class="card" onclick="loadPage('../mpmclab.html')">MPMC Lab</div>

    <div class="card" onclick="loadPage('../prob.html')">Probability</div>
    <div class="card" onclick="loadPage('../problab.html')">Prob Lab</div>

    <div class="card" onclick="loadPage('../ss.html')">SS</div>
    <div class="card" onclick="loadPage('../toc.html')">TOC</div>

    <div class="card" onclick="loadPage('../urban.html')">Urban</div>
    <div class="card" onclick="loadPage('../weblab.html')">Web Lab</div>

</div>

<iframe id="viewer"></iframe>

<script>
function loadPage(page) {
    document.getElementById("viewer").src = page;
}
</script>

</body>
</html>
