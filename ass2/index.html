<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Canvas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <canvas id="bgCanvas"></canvas>

    <div class="app-container">
        <header>
            <h1>🎨 Pixel Canvas</h1>
            <p>Draw your own pixel art!</p>
        </header>

        <div class="controls">
            <div class="control-group">
                <label for="colorPicker">Brush Color:</label>
                <input type="color" id="colorPicker" value="#9d4edd">
            </div>

            <div class="control-group">
                <label for="gridSize">Grid Size (Max 50):</label>
                <input type="number" id="gridSize" value="16" min="2" max="50">
            </div>

            <div class="button-group">
                <button id="btnCreate">Create Grid</button>
                <button id="btnClear" class="secondary">Clear Canvas</button>
            </div>
        </div>

        <div class="canvas-container">
            <div id="pixelCanvas"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
