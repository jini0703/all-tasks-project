<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gen Z Slang Translator</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .phone-card {
            background-color: white;
            width: 350px;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            color: #333;
            margin-bottom: 5px;
        }

        p.subtext {
            color: #777;
            font-size: 0.9rem;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 1rem;
            outline: none;
            transition: border 0.3s;
            margin-bottom: 15px;
        }

        input:focus {
            border-color: #764ba2;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #764ba2;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #5b3a7d;
        }

        .result-area {
            margin-top: 25px;
            min-height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .bubble {
            background-color: #f0f0f0;
            color: #333;
            padding: 15px 20px;
            border-radius: 15px;
            border-bottom-left-radius: 2px;
            display: none;
            font-weight: bold;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.05);
            animation: popIn 0.3s ease-out;
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .emoji {
            font-size: 2rem;
            margin-bottom: 10px;
            display: block;
        }
    </style>
</head>
<body>

    <div class="phone-card">
        <span class="emoji">💬</span>
        <h2>Slang Translator</h2>
        <p class="subtext">Type a message with Gen Z slang.</p>

        <input type="text" id="userMessage" placeholder="e.g. idk what to do tbh...">
        <button onclick="checkSlang()">Translate</button>

        <div class="result-area">
            <div id="resultBubble" class="bubble"></div>
        </div>
    </div>

    <script>
        const slangs = {
            "idk": "I don't know",
            "brb": "Be right back",
            "btw": "By the way",
            "iykyk": "If you know, you know",
            "fomo": "Fear of missing out",
            "rn": "Right now",
            "tbh": "To be honest",
            "ngl": "Not gonna lie",
            "sus": "Suspicious",
            "cap": "False / Lie",
            "gg": "Good game",
            "lol": "Laughing out loud"
        };

        function checkSlang() {
            const input = document.getElementById('userMessage').value;
            const bubble = document.getElementById('resultBubble');
            
            if (!input.trim()) {
                bubble.style.display = 'none';
                return;
            }

            const regex = new RegExp(`\\b(${Object.keys(slangs).join('|')})\\b`, 'i');
            
            const match = input.match(regex);

            if (match) {
                const wordFound = match[0].toLowerCase();
                const meaning = slangs[wordFound];
                
                bubble.innerText = `"${match[0]}" means: ${meaning}`;
                bubble.style.backgroundColor = "#e0ffe0";
                bubble.style.color = "#006400";
            } else {
                bubble.innerText = "It’s not a Gen Z word.";
                bubble.style.backgroundColor = "#ffe0e0";
                bubble.style.color = "#8b0000";
            }

            bubble.style.display = 'inline-block';
        }
    </script>

</body>
</html>
