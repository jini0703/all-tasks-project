<!DOCTYPE html>
<html>
<head>
    <title>All Tasks + Project</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;

            background: linear-gradient(-45deg, #5f0a87, #a4508b, #ff758c, #42a5f5);
            background-size: 400% 400%;
            animation: bg 10s ease infinite;
        }

        @keyframes bg {
            0% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
            100% {background-position: 0% 50%;}
        }

        /* PROJECT BOX */
        .main-box {
            width: 70%;
            margin: 60px auto;
            padding: 50px;
            text-align: center;
            color: white;

            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            border-radius: 20px;

            box-shadow: 0 8px 30px rgba(0,0,0,0.3);

            cursor: pointer;
            transition: 0.3s;
        }

        .main-box:hover {
            transform: scale(1.03);
        }

        .main-box h1 {
            font-size: 55px;
            margin: 10px 0;
        }

        /* TASKS */
        .tasks {
            padding: 30px;
        }

        .tasks h2 {
            color: white;
            text-align: center;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<!-- 🔥 PROJECT -->
<div class="main-box" onclick="openProject()">
    <h2>WEB DESIGN PROJECT</h2>
    <h1>🏠 NestQuest</h1>
    <p>Smart Roommate Compatibility Finder</p>
</div>

<!-- 🔥 TASKS -->
<div class="tasks">
    <h2>Lab Tasks</h2>

    <div class="container">

        <div class="card" onclick="openTask('./task1/task1.html')">Task 1</div>
        <div class="card" onclick="openTask('./task2.html')">Task 2</div>
        <div class="card" onclick="openTask('./tt.html')">Task 3</div>
        <div class="card" onclick="openTask('./task4/links.html')">Task 4</div>

        <div class="card" onclick="openTask('./task5/task5.html')">Task 5</div>
        <div class="card" onclick="openTask('./task6/task6.html')">Task 6</div>
        <div class="card" onclick="openTask('./task7/task7.html')">Task 7</div>
        <div class="card" onclick="openTask('./task8/task8.html')">Task 8</div>

        <!-- 🔥 NEW -->
        <div class="card" onclick="openTask('./task9/index.html')">Task 9</div>

        <div class="card" onclick="openTask('./task10.pdf')">Task 10</div>

        <div class="card" onclick="openTask('./task11/index.html')">Task 11</div>
        <div class="card" onclick="openTask('./task12/task12.html')">Task 12</div>
        <div class="card" onclick="openTask('./task13/index.html')">Task 13</div>
        <div class="card" onclick="openTask('./task14/task14.html')">Task 14</div>

        <div class="card" onclick="openTask('./task15/task15.html')">Task 15</div>
        <div class="card" onclick="openTask('./task16.1/task16.html')">Task 16</div>
        <div class="card" onclick="openTask('./task17/task17.html')">Task 17</div>

    </div>
</div>

<script>
function openTask(path) {
    window.open(path, '_blank');
}

/* 🔥 PROJECT PATH */
function openProject() {
    window.open('./group project/index.html', '_blank');
}
</script>

</body>
</html>
