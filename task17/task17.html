<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Task: Image Slider</title>
    <style>
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f1f5f9;
        }

        .slider-container {
            background: white;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .image-wrapper {
            width: 100%;
            height: 300px;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
            background-color: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.3s ease;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            gap: 12px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            background-color: #6366f1;
            color: white;
            transition: background-color 0.2s, transform 0.1s;
        }

        button:hover {
            background-color: #4f46e5;
        }

        button:active {
            transform: scale(0.97);
        }
    </style>
</head>
<body>

    <div class="slider-container">
        <div class="image-wrapper">
            <img id="sliderImage" src="https://picsum.photos/id/10/500/300" alt="Slider Image">
        </div>
        <div class="controls">
            <button id="prevBtn">Previous</button>
            <button id="nextBtn">Next</button>
        </div>
    </div>

    <script>
        const images = [
            "https://picsum.photos/id/10/500/300",
            "https://picsum.photos/id/11/500/300",
            "https://picsum.photos/id/12/500/300",
            "https://picsum.photos/id/13/500/300"
        ];

        let currentIndex = 0;
        const sliderImage = document.getElementById('sliderImage');

        document.getElementById('prevBtn').onclick = function() {
            currentIndex--;
            if (currentIndex < 0) {
                currentIndex = images.length - 1;
            }
            sliderImage.src = images[currentIndex];
        };

        document.getElementById('nextBtn').onclick = function() {
            currentIndex++;
            if (currentIndex >= images.length) {
                currentIndex = 0;
            }
            sliderImage.src = images[currentIndex];
        };
    </script>

</body>
</html>
